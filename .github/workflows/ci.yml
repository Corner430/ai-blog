name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - name: Lint
        run: yarn lint
      - name: Build
        run: yarn build
        env:
          HUNYUAN_API_KEY: dummy
          TENCENT_SECRET_ID: dummy
          TENCENT_SECRET_KEY: dummy
          ADMIN_PASSWORD: dummy
      - run: npx jest --ci
